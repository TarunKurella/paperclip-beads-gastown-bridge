<svg width="980" height="420" viewBox="0 0 980 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Feature map">
  <defs>
    <style>
      .t{font:700 24px Inter,system-ui,sans-serif;fill:#0f172a}
      .h{font:700 14px Inter,system-ui,sans-serif;fill:#0f172a}
      .b{font:500 12px Inter,system-ui,sans-serif;fill:#334155}
      .card{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:12}
      .line{stroke:#0ea5e9;stroke-width:2.5;marker-end:url(#a)}
    </style>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#0ea5e9"/>
    </marker>
  </defs>
  <text x="30" y="42" class="t">Bridge feature map</text>

  <rect x="30" y="80" width="280" height="120" class="card"/>
  <text x="48" y="110" class="h">Safety layer</text>
  <text x="48" y="132" class="b">• single_writer default</text>
  <text x="48" y="150" class="b">• owner-set / owner-list</text>
  <text x="48" y="168" class="b">• guardrail-check + run locks</text>

  <rect x="350" y="80" width="280" height="120" class="card"/>
  <text x="368" y="110" class="h">Execution/DAG layer</text>
  <text x="368" y="132" class="b">• exec-plan (ready queue)</text>
  <text x="368" y="150" class="b">• deps-sync (import edges)</text>
  <text x="368" y="168" class="b">• blockers-push + phase-feedback</text>

  <rect x="670" y="80" width="280" height="120" class="card"/>
  <text x="688" y="110" class="h">Operator UX layer</text>
  <text x="688" y="132" class="b">• TUI dashboard</text>
  <text x="688" y="150" class="b">• Paperclip plugin widget</text>
  <text x="688" y="168" class="b">• safe-cycle + guardrail actions</text>

  <path d="M310 140 C330 140,330 140,350 140" class="line"/>
  <path d="M630 140 C650 140,650 140,670 140" class="line"/>

  <rect x="160" y="250" width="660" height="120" class="card"/>
  <text x="180" y="282" class="h">Outcome</text>
  <text x="180" y="306" class="b">Predictable multi-system execution with minimal race risk, visible blockers, and operator-grade controls.</text>
  <text x="180" y="326" class="b">Use Paperclip for planning authority, Beads for dependency intelligence, Bridge for controlled synchronization.</text>
</svg>
